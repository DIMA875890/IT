<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="5">
    <title>Translator Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background: #f8f9fa; padding: 50px; }
        .card { border-radius: 15px; border: none; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
    </style>
</head>
<body>
<div class="container">
    <div class="card p-4">
        <h2 class="mb-4 text-primary">📊 Translation Feed</h2>
        <table class="table">
            <thead>
                <tr>
                    <th>Original</th>
                    <th>Result</th>
                    <th>Lang</th>
                    <th>Date</th>
                </tr>
            </thead>
            <tbody>
                {% for row in history %}
                <tr>
                    <td>{{ row[2] }}</td>
                    <td><strong>{{ row[3] }}</strong></td>
                    <td><span class="badge bg-dark">{{ row[4] }}</span></td>
                    <td class="text-muted small">{{ row[5] }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
